- title: "Cultuur & Muziek"
  description: >
    FOH & monitors met oog voor de partituur, de zaal en de mensen op het podium.
    Ik zoek uit wat technisch nodig is, maar blijf luisteren naar het muzikale verhaal.
  features:
    - Analyse van akoestiek, bezetting en dynamiek
    - Zorgvuldige integratie van surround en soundscapes
    - Rustige communicatie met artiesten en productie
- title: Corporate & Congres
  description: >
    Een zakelijke productie vraagt om verstaanbaarheid, timing en betrouwbaarheid.
    Ik organiseer de techniek strak, bewaak afspraken en zorg dat sprekers zich gehoord voelen.
  features:
    - Heldere voorbereiding en planning
    - IT- en netwerkkennis voor Dante en hybride events
    - Opnames direct bruikbaar voor post-productie
- title: Events & Festivals
  description: >
    Van strakke change-overs tot complexe buitenproducties.
    Ik houd overzicht, los problemen bij de oorzaak op en blijf gericht op het eindresultaat.
  features:
    - RF, Dante en systeemcontrole vooraf uitgewerkt
    - Snel schakelen zonder de grote lijn kwijt te raken
    - Eigen toolkit en meetapparatuur mee
